services:
  report-bot:
    build: .
    # ENV가 production이면 naver-stock-report-bot, 아니면 naver-stock-report-bot-dev
    image: naver-stock-report-bot:${ENV:-dev}
    container_name: naver-stock-report-bot${ENV_SUFFIX:-}
    user: "1001:1001"
    restart: always
    env_file: .env
    volumes:
      - ~/sqlite3:/app/db
      - ~/log:/app/log
